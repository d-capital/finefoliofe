<section class="quote-section">
  <div class="quote-image">
    <img [src]="screenshot" alt="Quote author photo" />
  </div>
  <div class="quote-text">
    <img style="margin-top: 5%;" src="quote_icon.png">
    <p style="font-size: 20px; font-weight: bold;">{{ quoteText }}</p>
    <hr style="width: 10%;margin-left: 0;margin-right: auto;">
    <h4>{{ quoteAuthor }}</h4>
    <span class="quote-author-subtitle">{{ quoteAuthorSubtitle }}</span>
  </div>
</section>
